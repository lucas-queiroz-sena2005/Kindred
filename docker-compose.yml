services:
  db:
    image: pgvector/pgvector:pg16
    container_name: kindred-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    volumes:
      - pgdata:/var/lib/postgresql/data #This line
      - ./backend/db/database.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: kindred-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      TMDB_API_KEY: ${TMDB_API_KEY}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES}
      PORT: 5000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/api').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - backend_net
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    ports:
      - "127.0.0.1:5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: kindred-frontend
    restart: always
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

networks:
  frontend_net:
    driver: bridge
  backend_net:
    internal: true

volumes:
  pgdata:
