<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="./public/kindred-icon.svg"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kindred</title>

        <script>
            (function () {
                try {
                    var prefersDark =
                        window.matchMedia &&
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches;
                    if (prefersDark)
                        document.documentElement.classList.add("dark");
                } catch (e) {}
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
